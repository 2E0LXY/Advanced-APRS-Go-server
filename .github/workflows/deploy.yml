name: Deploy to theloxleys

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to theloxleys
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        aprsnet.uk
          username:    root
          key:         ${{ secrets.SERVER_SSH_KEY }}
          port:        22
          script: |
            set -e
            cd /opt/aprs-gateway

            # Older installs generated these module files directly on the VPS.
            # Preserve any untracked copies once so Git can install the now
            # version-controlled, reproducible module definitions.
            stamp="$(date +%Y%m%d-%H%M%S)"
            for module_file in go.mod go.sum; do
              if [ -f "$module_file" ] && ! git ls-files --error-unmatch "$module_file" >/dev/null 2>&1; then
                mv "$module_file" "${module_file}.pretracked-${stamp}"
              fi
            done

            echo "=== git pull ==="
            git pull origin main

            echo "=== rebuild binary ==="
            /usr/local/go/bin/go build -o aprs_server .

            echo "=== open MQTT port 1883 ==="
            ufw allow 1883/tcp comment "APRS iGate MQTT" 2>/dev/null || true
            ufw status | grep 1883 || echo "(ufw not active - checking iptables)"
            iptables -C INPUT -p tcp --dport 1883 -j ACCEPT 2>/dev/null || \
              iptables -I INPUT -p tcp --dport 1883 -j ACCEPT 2>/dev/null || true

            echo "=== restart service ==="
            systemctl restart aprs

            echo "=== verify running ==="
            sleep 2
            systemctl is-active aprs
            echo "Deploy complete."
