<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APRS Gateway Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-gray-800 rounded-lg shadow-xl border border-gray-700 overflow-hidden">
        <div class="bg-blue-900 p-4 border-b border-gray-700">
            <h1 class="text-2xl font-bold text-white tracking-tight">APRS Configuration</h1>
        </div>
        
        <div class="p-6 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Callsign</label>
                    <input type="text" id="callsign" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500 uppercase">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Passcode</label>
                    <input type="text" id="passcode" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Upstream Server (Host:Port)</label>
                <input type="text" id="upstream_addr" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Server Subscription Filter</label>
                <input type="text" id="server_filter" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500" placeholder="e.g. m/50">
            </div>

            <div class="border-t border-gray-700 pt-4 mt-2">
                <h3 class="text-lg font-medium text-white mb-3">Global Drop Filters</h3>
                <div class="space-y-3">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" id="drop_pistar" class="form-checkbox h-5 w-5 text-blue-600 rounded bg-gray-700 border-gray-600 focus:ring-blue-500">
                        <span class="text-gray-300">Drop Pi-Star Telemetry</span>
                    </label>
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" id="drop_dstar" class="form-checkbox h-5 w-5 text-blue-600 rounded bg-gray-700 border-gray-600 focus:ring-blue-500">
                        <span class="text-gray-300">Drop D-STAR Routing</span>
                    </label>
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" id="drop_apdesk" class="form-checkbox h-5 w-5 text-blue-600 rounded bg-gray-700 border-gray-600 focus:ring-blue-500">
                        <span class="text-gray-300">Drop APDESK (PinPoint APRS Status)</span>
                    </label>
                </div>
            </div>

            <div class="pt-4 flex items-center justify-between">
                <span id="status" class="text-sm font-medium text-green-400 hidden">Saved and reconnecting...</span>
                <button onclick="saveConfig()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition duration-150 ml-auto">
                    Save & Reconnect
                </button>
            </div>
        </div>
    </div>

    <script>
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                document.getElementById('callsign').value = data.callsign;
                document.getElementById('passcode').value = data.passcode;
                document.getElementById('upstream_addr').value = data.upstream_addr;
                document.getElementById('server_filter').value = data.server_filter;
                document.getElementById('drop_pistar').checked = data.drop_pistar;
                document.getElementById('drop_dstar').checked = data.drop_dstar;
                document.getElementById('drop_apdesk').checked = data.drop_apdesk;
            } catch (err) {
                console.error("Failed to load config", err);
            }
        }

        async function saveConfig() {
            const payload = {
                callsign: document.getElementById('callsign').value,
                passcode: document.getElementById('passcode').value,
                upstream_addr: document.getElementById('upstream_addr').value,
                server_filter: document.getElementById('server_filter').value,
                drop_pistar: document.getElementById('drop_pistar').checked,
                drop_dstar: document.getElementById('drop_dstar').checked,
                drop_apdesk: document.getElementById('drop_apdesk').checked
            };

            const btn = document.querySelector('button');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                status.classList.remove('hidden');
                setTimeout(() => {
                    status.classList.add('hidden');
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                }, 2000);
            } catch (err) {
                alert("Failed to save configuration");
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }

        loadConfig();
    </script>
</body>
</html>
